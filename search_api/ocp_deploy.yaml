---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moj-search-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: moj-search-api
  template:
    metadata:
      labels:
        app: moj-search-api
    spec:
      containers:
      - name: api
        image: milvus/search-api:latest
        ports:
        - containerPort: 5000
        env:
        - name: MILVUS_HOST
          value: "milvus-standalone"
        - name: MILVUS_PORT
          value: "19530"
        - name: MILVUS_COLLECTION
          value: "knowledge_base"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: moj-search-api
spec:
  # Changed from LoadBalancer to ClusterIP
  type: ClusterIP 
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
  selector:
    app: moj-search-api



